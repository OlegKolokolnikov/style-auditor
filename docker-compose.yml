services:
  backend:
    build:
      context: ./backend
    container_name: style-auditor-backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api/analyze
    container_name: style-auditor-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
