<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hat brim -->
  <ellipse cx="32" cy="28" rx="20" ry="4" fill="#1a1008"/>
  <!-- Hat top -->
  <rect x="18" y="10" width="28" height="18" rx="3" fill="#1a1008"/>
  <!-- Hat band -->
  <rect x="18" y="23" width="28" height="4" rx="1" fill="#c8a84b"/>
  <!-- Face -->
  <circle cx="32" cy="42" r="16" fill="#f4c87a"/>
  <!-- Ears -->
  <polygon points="18,32 13,22 23,28" fill="#f4c87a"/>
  <polygon points="46,32 51,22 41,28" fill="#f4c87a"/>
  <!-- Inner ears -->
  <polygon points="18,31 15,24 22,28" fill="#e8a0a0"/>
  <polygon points="46,31 49,24 42,28" fill="#e8a0a0"/>
  <!-- Eyes -->
  <ellipse cx="26" cy="41" rx="3" ry="3.5" fill="#2d1a00"/>
  <ellipse cx="38" cy="41" rx="3" ry="3.5" fill="#2d1a00"/>
  <!-- Eye shine -->
  <circle cx="27" cy="40" r="1" fill="white"/>
  <circle cx="39" cy="40" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="47" rx="2" ry="1.5" fill="#e06060"/>
  <!-- Mouth -->
  <path d="M29 49 Q32 52 35 49" stroke="#2d1a00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="16" y1="47" x2="28" y2="48" stroke="#2d1a00" stroke-width="0.8"/>
  <line x1="16" y1="50" x2="28" y2="49" stroke="#2d1a00" stroke-width="0.8"/>
  <!-- Whiskers right -->
  <line x1="48" y1="47" x2="36" y2="48" stroke="#2d1a00" stroke-width="0.8"/>
  <line x1="48" y1="50" x2="36" y2="49" stroke="#2d1a00" stroke-width="0.8"/>
</svg>
